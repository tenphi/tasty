name: Dev Release

on:
  pull_request:
    branches: [main]

jobs:
  dev-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Set dev version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DEV_VERSION="0.0.0-dev.${SHORT_SHA}"
          pnpm pkg set version="${DEV_VERSION}"
          echo "DEV_VERSION=${DEV_VERSION}" >> $GITHUB_ENV

      - name: Publish dev release
        run: npm publish --tag dev --access public --provenance

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `📦 Dev release published!\n\n\`\`\`\npnpm add @tenphi/tasty@${process.env.DEV_VERSION}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(
              (c) =>
                c.user.type === 'Bot' &&
                c.body.includes('Dev release published'),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
